<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <title>HPL Plaadid</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>HPL laminaatplaadid</h1>
  <p>MDF, vineer ja PLP lahendused</p>
</header>

<nav>
  <a href="#tooted">Tooted</a>
  <a href="#teenused">Teenused</a>
  <a href="#kontakt">Kontakt</a>
</nav>

<section id="tooted">
  <h2>Tooted</h2>
  <div class="grid">
    <div class="card">HPL + MDF</div>
    <div class="card">HPL + vineer</div>
    <div class="card">HPL + PLP</div>
    <div class="card">Aknalauad</div>
  </div>
</section>

<section id="teenused">
  <h2>Teenused</h2>
  <p>Lõikus, kantimine, paigaldus</p>
</section>

<section id="kontakt">
  <h2>Kontakt</h2>
  <form>
    <input type="text" placeholder="Nimi" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Sõnum"></textarea>
    <button type="submit">Saada</button>
  </form>
</section>

<footer>
  <p>© 2026 Sinu Firma</p>
</footer>

</body>
</html>
